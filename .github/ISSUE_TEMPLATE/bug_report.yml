name: 不具合報告
description: 再現可能な不具合や端末固有の問題を報告します
title: "[Bug] "
labels:
   - bug
body:
   - type: markdown
     attributes:
        value: |
           報告ありがとうございます。個人の file、local path、network name、live QR、room token は投稿しないでください。Security issue は公開せず、Security tab の private vulnerability reporting を使用してください。
   - type: input
     id: version
     attributes:
        label: Local File Transfer の version
        placeholder: 2.0.0-rc.2
     validations:
        required: true
   - type: dropdown
     id: architecture
     attributes:
        label: Windows architecture
        options:
           - x64
           - ARM64
           - 不明
     validations:
        required: true
   - type: input
     id: environment
     attributes:
        label: OS・browser・device
        description: 例: Windows 11 24H2 / iPhone Safari / iOS version
     validations:
        required: true
   - type: textarea
     id: steps
     attributes:
        label: 再現手順
        description: Synthetic file name と、問題が起きるまでの操作を記載してください
     validations:
        required: true
   - type: textarea
     id: expected
     attributes:
        label: 期待した結果
     validations:
        required: true
   - type: textarea
     id: actual
     attributes:
        label: 実際の結果
     validations:
        required: true
   - type: textarea
     id: diagnostics
     attributes:
        label: 非機密の diagnostics
        description: Redacted diagnostics、artifact SHA-256、file size、再現頻度など。Personal data は除いてください
   - type: checkboxes
     id: safety
     attributes:
        label: 公開情報の確認
        options:
           - label: 投稿内容に personal file、absolute path、live QR、credential が含まれていません
             required: true
