name: 継続的検証

on:
   push:
      branches: [main]
   pull_request:
   workflow_dispatch:

permissions:
   contents: read

concurrency:
   group: ci-${{ github.ref }}
   cancel-in-progress: true

jobs:
   verify:
      name: Windows で検証
      runs-on: windows-latest
      timeout-minutes: 30
      steps:
         - name: Source を checkout
           uses: actions/checkout@v4
         - name: Node.js を設定
           uses: actions/setup-node@v4
           with:
              node-version: 22
              cache: npm
              cache-dependency-path: |
                 package-lock.json
                 apps/server/package-lock.json
                 apps/web/package-lock.json
                 apps/desktop/package-lock.json
         - name: Root dependency を install
           run: npm ci
         - name: Server dependency を install
           run: npm ci --prefix apps/server
         - name: Web dependency を install
           run: npm ci --prefix apps/web
         - name: Desktop dependency を install
           run: npm ci --prefix apps/desktop
         - name: 公開ツリーを監査
           run: npm run audit:public
         - name: Test を実行
           run: npm run test:all
         - name: Build
           run: npm run build
         - name: Dependency vulnerability を監査
           shell: pwsh
           run: |
              npm audit --audit-level=high
              npm audit --audit-level=high --prefix apps/server
              npm audit --audit-level=high --prefix apps/web
              npm audit --audit-level=high --prefix apps/desktop
